name: mystyle-prod

services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${DOCKER_NODE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_API_BASE_URL: /api
        API_INTERNAL_BASE_URL: http://server:8080/api
    container_name: mystyle-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      API_INTERNAL_BASE_URL: http://server:8080/api
    depends_on:
      - server

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
      args:
        MAVEN_IMAGE: ${DOCKER_MAVEN_IMAGE:-maven:3.9-eclipse-temurin-21}
        JRE_IMAGE: ${DOCKER_JRE_IMAGE:-eclipse-temurin:21-jre}
    container_name: mystyle-server
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: mystyle
      MYSQL_USERNAME: ${MYSQL_USERNAME:-mystyle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mystyle_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-replace-with-production-secret}
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      MINIMAX_TEXT_MODEL: ${MINIMAX_TEXT_MODEL:-MiniMax-M2.7}
      MINIMAX_VISION_MODEL: ${MINIMAX_VISION_MODEL:-MiniMax-Text-01}
      LLM_BUDGET_ENABLED: ${LLM_BUDGET_ENABLED:-true}
      LLM_BUDGET_ZONE_ID: ${LLM_BUDGET_ZONE_ID:-Asia/Shanghai}
      LLM_DAILY_BUDGET_RMB: ${LLM_DAILY_BUDGET_RMB:-5.0}
      LLM_INPUT_PRICE_RMB_PER_MILLION_TOKENS: ${LLM_INPUT_PRICE_RMB_PER_MILLION_TOKENS:-2.1}
      LLM_OUTPUT_PRICE_RMB_PER_MILLION_TOKENS: ${LLM_OUTPUT_PRICE_RMB_PER_MILLION_TOKENS:-8.4}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: mystyle-prod-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mystyle_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mystyle}
      MYSQL_USER: ${MYSQL_USERNAME:-mystyle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mystyle_password}
    volumes:
      - mystyle_prod_mysql:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: mystyle-prod-redis
    volumes:
      - mystyle_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: mystyle-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server

volumes:
  mystyle_prod_mysql:
    name: mystyle_prod_mysql_data
  mystyle_prod_redis:
    name: mystyle_prod_redis_data
